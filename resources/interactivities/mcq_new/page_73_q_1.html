<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol>
              </ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [{"title": "What is the circular movement of water in nature called?", "options": ["Water drain", "Water route", "Water cycle", "Water circle"]}, {"title": "Where does the river Godavari end its journey?", "options": ["River Ganga", "Trimbakeshwar", "Nilgiris", "Coringa Mangrove Forests"]}, {"title": "Why is oil added to pickles?", "options": ["To add taste", "To give smell", "To keep it soft", "To keep out air"]}, {"title": "What is the colour of the bin used for dry waste in schools?", "options": ["Blue", "Green", "Yellow", "Red"]}, {"title": "What does the Ashoka Chakra on the National Flag represent?", "options": ["Nature", "Unity", "Duty", "Peace"]}];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
