<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol></ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [
        {
          title: "What is used to make silk thread?",
          options: [
            "Sheep wool",
            "Cotton seeds",
            "Silk moth cocoon",
            "Banana stem",
          ],
          answer: 2,
        },
        {
          title: "What is Khadi?",
          options: [
            "A chemical dye",
            "A hand-woven fabric",
            "A plastic fibre",
            "A type of embroidery",
          ],
          answer: 1,
        },
        {
          title: "Which insect stitches its nest using spider silk?",
          options: ["Baya weaver", "Butterfly", "Tailorbird", "Silkworm"],
          answer: 0,
        },
        {
          title: "What tool is used for spinning cotton into thread?",
          options: ["Handloom", "Spindle", "Charkha", "Embroidery frame"],
          answer: 2,
        },
        {
          title: "Which fabric is made from goat wool in Ladakh?",
          options: ["Bandhan", "Pashmina", "Kantha", "Khadi"],
          answer: 1,
        },
      ];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
