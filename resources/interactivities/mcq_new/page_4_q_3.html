<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol></ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [
        {
          title: "What is groundwater?",
          options: [
            "Water in rivers and lakes",
            "Water stored in tanks",
            "Water stored deep underground",
            "Water falling as rain",
          ],
          correct: 2
        },
        {
          title: "What helps us draw groundwater for use?",
          options: [
            "Dams",
            "Hand pumps and wells",
            "Lakes and ponds",
            "Buckets and taps",
          ],
          correct: 1
        },
        {
          title: "What does water vapour form after rising into the sky?",
          options: ["Rainbows", "Clouds", "Rivers", "Wind"],
          correct: 1
        },
        {
          title: "Which of these rivers flows towards the Arabian Sea?",
          options: ["Ganga", "Yamuna", "Narmada", "Godavari"],
          correct: 2
        },
        {
          title: "Why is freshwater important for living beings?",
          options: [
            "It keeps rivers full.",
            "It is used to make machines.",
            "It is essential for drinking.",
            "It helps to ride boats.",
          ],
          correct: 2
        },
      ];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
