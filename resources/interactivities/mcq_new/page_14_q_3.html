<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol></ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [
        {
          title: "Where does the river Godavari originate from?",
          options: [
            "Himalayas",
            "Western Ghats",
            "Aravalli Hills",
            "Eastern Ghats",
          ],
          correct: 1
        },
        {
          title: "What join the river to make it wider and stronger?",
          options: ["Lakes", "Dams", "Tributaries", "Roads"],
          correct: 2
        },
        {
          title:
            "What is formed when a river meets the sea and splits into small streams?",
          options: ["Dam", "Island", "Delta", "Waterfall"],
          correct: 2
        },
        {
          title: "Which of these helps to reduce river pollution?",
          options: [
            "Throwing plastic",
            "Using eco-friendly products",
            "Pouring soap water",
            "Cutting trees",
          ],
          correct: 1
        },
        {
          title: "What happens when fertilisers enter the river?",
          options: [
            "Plants overgrow.",
            "Water is cleaned.",
            "Fish grow.",
            "Trees die.",
          ],
          correct: 0
        },
      ];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
