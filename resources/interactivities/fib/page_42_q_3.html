<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drag and Drop</title>

    <link rel="stylesheet" href="lib/font-awesome/css/font-awesome.min.css" />
    <link rel="stylesheet" href="lib/bootstrap/css/bootstrap.min.css" />

    <link href="css/jquery-ui.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/dragndrop.css" rel="stylesheet" />

    <script
      type="text/javascript"
      src="lib/jquery/jquery-1.11.3.min.js"
    ></script>
    <script src="lib/bootstrap/js/bootstrap.min.js"></script>
    <script src="js/jquery-ui.js"></script>
    <script src="lib/jquery.ui.touch-punch.min.js"></script>
    <script src="js/dragndrop.js"></script>
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-12">
          <div id="wrapper">
            <section class="content">
              <div class="d-flex">
                <p class="question mr-2"></p>
                <p class="question">Fill in the blanks.</p>
              </div>

              <div class="dragndrop-ques">
                <ol type="b" id="questions-list"></ol>
              </div>

              <div class="dragndrop-options">
                <ul></ul>
              </div>
            </section>
            <div class="feedback" id="feedback"></div>
            <div class="score-display" id="score-display"></div>
            <div class="score">
              <span id="app-user-score">0</span> /
              <span id="app-total-score">1</span>
            </div>
            <footer>
              <div class="buttons">
                <button type="submit" id="btn-submit" class="btn btn-submit">
                  Submit
                </button>
                <button type="submit" id="btn-reset" class="btn btn-reset">
                  Reset
                </button>
              </div>
            </footer>
          </div>
        </div>
      </div>
    </div>

    <div
      id="feedbackModal"
      class="modal fade"
      tabindex="-1"
      data-backdrop="static"
      data-keyboard="false"
    >
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-body">
            <div class="gamewin-msg"></div>
          </div>
        </div>

        <div id="balloon-wrap">
          <div class="balloon x1"><img src="img/balloon1.png" /></div>
          <div class="balloon x2"><img src="img/balloon2.png" /></div>
          <div class="balloon x3"><img src="img/balloon3.png" /></div>
          <div class="balloon x4"><img src="img/balloon4.png" /></div>
          <div class="balloon x5"><img src="img/balloon5.png" /></div>
          <div class="balloon x6"><img src="img/balloon6.png" /></div>
        </div>
      </div>
    </div>

    <audio controls id="audio-intro" class="hide">
      <source src="./audio/main.mp3" type="audio/mp3" />
    </audio>
    <audio id="audio-try-again">
      <source src="../../audio/try-again.mp3" type="audio/mp3" />
    </audio>
    <audio id="audio-clap">
      <source src="../../audio/welldone.mp3" type="audio/mp3" />
    </audio>

    <script type="text/javascript">
      const questions = [
        {
          title:
            "The _____ of India is a land full of colours, creativity and life. People here live closely with _____ The region is home to lush _____, flowing rivers, and amazing animals and birds. From weaving and _____ to music, dance and _____ — every part of life is connected to the hills, forests and wildlife around them. It is a place where _____ and nature grow together.",
          answers: [
            "Northeast",
            "nature",
            "forests",
            "crafts",
            "festivals",
            "culture",
          ],
        },
      ];
    </script>
    <script type="text/javascript">
      jQuery(document).ready(function () {
        DND.loadQuestions();
        $("#btn-submit").click(DND.submitAnswer);
        $("#btn-reset").click(DND.reset);
      });
    </script>
  </body>
</html>
