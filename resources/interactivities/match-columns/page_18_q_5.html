<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Match the Columns Activity</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="match-columns-wrapper" style="position: relative">
        <div class="match-columns-section">
          <ul class="column-a"></ul>
          <ul class="column-b"></ul>
        </div>
        <svg
          id="match-lines-svg"
          style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
          "
        ></svg>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>
    <script type="text/javascript">
      const matchColumnsQuestions = {
        left: [
          "(a) Mould",
          "(b) Oil in pickles",
          "(c) Fridge",
          "(d) Saliva",
          "(e) Sunlight",
        ],
        right: [
          "(i) Helps in digestion",
          "(ii) Slows down microbial growth",
          "(iii) Used to dry chillies in the sun",
          "(iv) Microbes growing on food",
          "(v) Blocks air and prevents spoilage",
        ],
        matches: [3,4,1,0,2],
      };
    </script>
    <script src="js/match-columns.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        initMatchColumnsQuiz(matchColumnsQuestions);
      });
    </script>
  </body>
</html>
